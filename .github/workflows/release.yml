name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-arm64
            os: macos-latest
            target: aarch64-apple-darwin
            archive: tmwd-cdp-bridge-macos-arm64.tar.gz
            bin: tmwd-cdp-bridge
          - name: macos-x64
            os: macos-latest
            target: x86_64-apple-darwin
            archive: tmwd-cdp-bridge-macos-x64.tar.gz
            bin: tmwd-cdp-bridge
          - name: linux-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tmwd-cdp-bridge-linux-x64.tar.gz
            bin: tmwd-cdp-bridge
          - name: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: tmwd-cdp-bridge-windows-x64.zip
            bin: tmwd-cdp-bridge.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage archive
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "dist/${{ matrix.name }}"
          cp "target/${{ matrix.target }}/release/${{ matrix.bin }}" "dist/${{ matrix.name }}/"
          cp README.md README.zh-CN.md LICENSE "dist/${{ matrix.name }}/"
          cp -R docs extension scripts skills "dist/${{ matrix.name }}/"

      - name: Archive unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          tar -C "dist/${{ matrix.name }}" -czf "${{ matrix.archive }}" .
          shasum -a 256 "${{ matrix.archive }}" > "${{ matrix.archive }}.sha256"

      - name: Archive windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/${{ matrix.name }}/*" -DestinationPath "${{ matrix.archive }}"
          $hash = (Get-FileHash "${{ matrix.archive }}" -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ matrix.archive }}" | Out-File -Encoding ascii "${{ matrix.archive }}.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            ${{ matrix.archive }}
            ${{ matrix.archive }}.sha256

  publish:
    name: Publish GitHub release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Resolve release notes
        shell: bash
        run: |
          set -euo pipefail
          notes="docs/releases/${GITHUB_REF_NAME}.md"
          if [[ ! -f "$notes" ]]; then
            echo "::error::Missing release notes: $notes"
            exit 1
          fi
          echo "RELEASE_NOTES=$notes" >> "$GITHUB_ENV"

      - name: Publish
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ env.RELEASE_NOTES }}
          files: |
            release-artifacts/*
