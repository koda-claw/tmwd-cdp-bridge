<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TMWD CDP Bridge</title>
<style>
:root {
  color-scheme: light dark;
  --bg: #f4f6f9;
  --panel: #ffffff;
  --panel-2: #eef2f6;
  --line: #ccd5df;
  --text: #17202b;
  --muted: #617084;
  --soft: #344255;
  --blue: #0b68b7;
  --green: #16875a;
  --amber: #b07000;
  --red: #c83f46;
  --dot-shadow: rgba(176, 112, 0, .16);
  --ok-shadow: rgba(22, 135, 90, .16);
  --bad-shadow: rgba(200, 63, 70, .16);
  --button-border: #2f6f9f;
  --button-bg: #0f5f9c;
  --button-bg-hover: #0b4f83;
  --button-text: #ffffff;
  --button-secondary-bg: #f8fafc;
  --button-secondary-hover: #eef3f7;
  --switch-bg: #d9e1ea;
  --switch-on-bg: #d9f1e6;
  --switch-on-border: #65b38e;
  --mono-bg: #f8fafc;
  --mono-text: #253246;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #111318;
    --panel: #191d24;
    --panel-2: #202631;
    --line: #323a47;
    --text: #eef2f7;
    --muted: #98a4b3;
    --soft: #c7d0dc;
    --blue: #63b3ff;
    --green: #42d392;
    --amber: #f4c15d;
    --red: #ff6b6b;
    --dot-shadow: rgba(244, 193, 93, .12);
    --ok-shadow: rgba(66, 211, 146, .14);
    --bad-shadow: rgba(255, 107, 107, .14);
    --button-border: #3d6b9d;
    --button-bg: #1d3957;
    --button-bg-hover: #264b72;
    --button-text: #f6fbff;
    --button-secondary-bg: #171b22;
    --button-secondary-hover: #202632;
    --switch-bg: #10141a;
    --switch-on-bg: #163728;
    --switch-on-border: #2c8b61;
    --mono-bg: #0c0f14;
    --mono-text: #dde6ef;
  }
}

* { box-sizing: border-box; }

body {
  width: 430px;
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font: 12px ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
}

.shell {
  min-height: 480px;
  padding: 14px;
}

.topbar {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--line);
}

.brand {
  display: grid;
  gap: 4px;
  min-width: 0;
}

.eyebrow {
  color: var(--blue);
  font-size: 10px;
  letter-spacing: 0;
  text-transform: uppercase;
}

h1 {
  margin: 0;
  font-size: 17px;
  font-weight: 720;
  letter-spacing: 0;
}

.status-pill {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  min-height: 28px;
  padding: 5px 9px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: var(--panel);
  color: var(--soft);
  white-space: nowrap;
}

.dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--amber);
  box-shadow: 0 0 0 3px var(--dot-shadow);
}

.status-pill[data-state="ok"] .dot {
  background: var(--green);
  box-shadow: 0 0 0 3px var(--ok-shadow);
}

.status-pill[data-state="bad"] .dot {
  background: var(--red);
  box-shadow: 0 0 0 3px var(--bad-shadow);
}

.grid {
  display: grid;
  gap: 10px;
  margin-top: 12px;
}

.panel {
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--panel);
  overflow: hidden;
}

.panel-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  padding: 9px 10px;
  border-bottom: 1px solid var(--line);
  background: var(--panel-2);
}

.panel-title {
  margin: 0;
  color: var(--text);
  font-size: 12px;
  font-weight: 700;
}

.actions {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  justify-content: flex-end;
}

.debug-row {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 10px;
  align-items: center;
  padding: 10px;
}

.debug-copy {
  display: grid;
  gap: 4px;
  min-width: 0;
}

.debug-title {
  color: var(--text);
  font-weight: 700;
}

.debug-note {
  color: var(--muted);
  line-height: 1.35;
}

.switch {
  position: relative;
  display: inline-flex;
  width: 44px;
  height: 24px;
  flex: 0 0 auto;
  align-items: center;
}

.switch input {
  position: absolute;
  width: 1px;
  height: 1px;
  opacity: 0;
}

.slider {
  width: 44px;
  height: 24px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: var(--switch-bg);
  cursor: pointer;
}

.slider::after {
  content: "";
  position: absolute;
  top: 4px;
  left: 4px;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: var(--muted);
  transition: transform .14s ease, background .14s ease;
}

.switch input:checked + .slider {
  border-color: var(--switch-on-border);
  background: var(--switch-on-bg);
}

.switch input:checked + .slider::after {
  transform: translateX(20px);
  background: var(--green);
}

.switch input:focus-visible + .slider {
  outline: 2px solid var(--blue);
  outline-offset: 2px;
}

button {
  min-height: 28px;
  border: 1px solid var(--button-border);
  border-radius: 6px;
  padding: 5px 9px;
  background: var(--button-bg);
  color: var(--button-text);
  cursor: pointer;
  font: inherit;
}

button:hover { background: var(--button-bg-hover); }
button:active { transform: translateY(1px); }
button.secondary {
  border-color: var(--line);
  background: var(--button-secondary-bg);
  color: var(--soft);
}
button.secondary:hover { background: var(--button-secondary-hover); }
button:disabled {
  cursor: not-allowed;
  opacity: .55;
  transform: none;
}

.kv {
  display: grid;
  grid-template-columns: 86px minmax(0, 1fr);
  gap: 7px 10px;
  padding: 10px;
}

.key { color: var(--muted); }
.value {
  min-width: 0;
  overflow: hidden;
  color: var(--soft);
  text-overflow: ellipsis;
  white-space: nowrap;
}

.mono-box {
  margin: 0;
  min-height: 188px;
  max-height: 250px;
  overflow: auto;
  padding: 10px;
  background: var(--mono-bg);
  color: var(--mono-text);
  white-space: pre-wrap;
  word-break: break-word;
}

.footer {
  display: flex;
  justify-content: space-between;
  gap: 10px;
  margin-top: 10px;
  color: var(--muted);
}

.hint {
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.count {
  flex: 0 0 auto;
  color: var(--soft);
}
</style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div class="brand">
        <div class="eyebrow">Agent Browser Bridge</div>
        <h1>TMWD CDP Bridge</h1>
      </div>
      <div id="bridgeStatus" class="status-pill" data-state="pending">
        <span class="dot"></span>
        <span id="bridgeStatusText">Checking</span>
      </div>
    </header>

    <section class="grid">
      <section class="panel">
        <div class="panel-head">
          <h2 class="panel-title">Current Tab</h2>
          <div class="actions">
            <button id="copyUrl" class="secondary" type="button">Copy URL</button>
          </div>
        </div>
        <div class="kv">
          <div class="key">Title</div><div id="tabTitle" class="value">-</div>
          <div class="key">Origin</div><div id="tabOrigin" class="value">-</div>
          <div class="key">Tab ID</div><div id="tabId" class="value">-</div>
          <div class="key">Runtime</div><div id="runtimeId" class="value">-</div>
        </div>
      </section>

      <section class="panel">
        <div class="debug-row">
          <div class="debug-copy">
            <div class="debug-title">Debug page badge</div>
            <div id="badgeState" class="debug-note">Off by default. Shows a small diagnostic badge on pages.</div>
          </div>
          <label class="switch" title="Show page debug badge">
            <input id="badgeToggle" type="checkbox" aria-label="Show page debug badge">
            <span class="slider"></span>
          </label>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2 class="panel-title">Cookies</h2>
          <div class="actions">
            <button id="copyCookies" class="secondary" type="button" disabled>Copy</button>
            <button id="refresh" type="button">Refresh</button>
          </div>
        </div>
        <pre id="out" class="mono-box">Loading cookies...</pre>
      </section>
    </section>

    <footer class="footer">
      <span id="hint" class="hint">Ready</span>
      <span id="cookieCount" class="count">0 cookies</span>
    </footer>
  </main>
  <script src="popup.js"></script>
</body>
</html>
